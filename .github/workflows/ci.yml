name: CI - Retraining Model

on:
  push:
    branches:
      - main

jobs:
  retraining:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI"
          echo "MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME"
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Yud1Pp/Membangun_Model_YudiPratamaPutra.mlflow
          MLFLOW_TRACKING_USERNAME: Yud1Pp

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn imbalanced-learn \
                      xgboost mlflow dagshub

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Yud1Pp/Membangun_Model_YudiPratamaPutra.mlflow
          MLFLOW_TRACKING_USERNAME: Yud1Pp
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . \
            -P n_estimators=200 \
            -P max_depth=5 \
            -P learning_rate=0.1 \
            --env-manager=local

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Yud1Pp/Membangun_Model_YudiPratamaPutra.mlflow
          MLFLOW_TRACKING_USERNAME: Yud1Pp
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python -c "
          import mlflow, os
          client = mlflow.tracking.MlflowClient()
          experiments = client.search_experiments()
          for exp in experiments:
              print(f'Experiment: {exp.name} | ID: {exp.experiment_id}')
          runs = client.search_runs(
              experiment_ids=[exp.experiment_id for exp in experiments],
              order_by=['start_time DESC'],
              max_results=1
          )
          run_id = runs[0].info.run_id
          print(f'Latest Run ID: {run_id}')
          with open('run_id.txt', 'w') as f:
              f.write(run_id)
          "
          echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV

      # ✅ STEP BARU
      - name: Register model to MLflow Registry
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Yud1Pp/Membangun_Model_YudiPratamaPutra.mlflow
          MLFLOW_TRACKING_USERNAME: Yud1Pp
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python -c "
          import mlflow

          run_id = '${{ env.RUN_ID }}'
          print(f'Registering run: {run_id}')

          result = mlflow.register_model(
              model_uri=f'runs:/{run_id}/xgboost-ci-model',
              name='telco-churn-xgboost'
          )
          print(f'Registered: version={result.version}, status={result.status}')
          "

      - name: Install Python dependencies for upload
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-ci-model
          path: MLProject/mlruns/

      - name: Build Docker Model
        run: |
          docker build -t telco-churn-xgboost:latest ./MLProject

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag telco-churn-xgboost:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-xgboost:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-xgboost:latest
